<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0A0A0F;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    width: 100%;
    height: 100%;
    padding: 60px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    border: 1px solid rgba(0,212,170,0.15);
  }
  .accent-line {
    width: 80px;
    height: 3px;
    background: #00D4AA;
    margin-bottom: 32px;
  }
  .eyebrow {
    font-size: 18px;
    color: #00D4AA;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 56px;
    font-weight: 700;
    color: #F1F5F9;
    line-height: 1.1;
    margin-bottom: 24px;
  }
  h1 span { color: #00D4AA; }
  .sub {
    font-size: 20px;
    color: #94A3B8;
    margin-bottom: 48px;
  }
  .tags {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .tag {
    padding: 8px 20px;
    border: 1px solid rgba(0,212,170,0.4);
    color: #00D4AA;
    font-size: 14px;
    letter-spacing: 0.05em;
  }
  .url {
    position: absolute;
    bottom: 48px;
    right: 80px;
    font-size: 16px;
    color: #475569;
  }
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="grid"></div>
  <div class="accent-line"></div>
  <p class="eyebrow">Data Analyst</p>
  <h1>Turning support noise<br>into <span>data clarity.</span></h1>
  <p class="sub">Power BI · SQL · Python · 5 yrs CX Operations</p>
  <div class="tags">
    <span class="tag">Power BI</span>
    <span class="tag">DAX</span>
    <span class="tag">SQL</span>
    <span class="tag">Python</span>
    <span class="tag">Power Query</span>
  </div>
  <span class="url">vmittestainer.github.io</span>
</div>
</body>
</html>
