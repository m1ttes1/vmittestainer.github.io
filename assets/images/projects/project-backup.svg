  <text x="36" y="125" fill="#F8F8F8" font-size="32" font-weight="700">47</text>
  <text x="36" y="148" fill="#00D4AA" font-size="10">▲ +3 this month</text>

  <!-- Card 2: Success Rate -->
  <rect x="205" y="68" width="170" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="221" y="90" fill="#4A5568" font-size="10">SUCCESS RATE</text>
  <text x="221" y="125" fill="#00D4AA" font-size="32" font-weight="700">99.8%</text>
  <text x="221" y="148" fill="#4A5568" font-size="10">last 30 days</text>

  <!-- Card 3: Incidents -->
  <rect x="390" y="68" width="170" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="406" y="90" fill="#4A5568" font-size="10">UNDETECTED INCIDENTS</text>
  <text x="406" y="125" fill="#F8F8F8" font-size="32" font-weight="700">0</text>
  <text x="406" y="148" fill="#00D4AA" font-size="10">6-month streak</text>

  <!-- Card 4: Avg Response -->
  <rect x="575" y="68" width="205" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="591" y="90" fill="#4A5568" font-size="10">ALERT RESPONSE TIME</text>
  <text x="591" y="125" fill="#F8F8F8" font-size="32" font-weight="700">4.2<tspan font-size="16" fill="#4A5568">min</tspan></text>
  <text x="591" y="148" fill="#00D4AA" font-size="10">▼ -62% vs manual</text>

