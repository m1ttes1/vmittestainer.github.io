  <line x1="520" y1="330" x2="760" y2="330" stroke="#1E2535" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="520" y1="300" x2="760" y2="300" stroke="#1E2535" stroke-width="0.5" stroke-dasharray="3,3"/>
