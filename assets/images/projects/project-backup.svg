<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#0F1117"/>

  <!-- Top bar -->
  <rect width="800" height="48" fill="#161B27"/>
  <text x="20" y="30" fill="#00D4AA" font-size="13" font-weight="700">BACKUP MONITORING</text>
  <text x="20" y="43" fill="#4A5568" font-size="10">Power BI · Zabbix · Oct 2024 – Present</text>
  <circle cx="760" cy="24" r="6" fill="#00D4AA" opacity="0.3"/>
