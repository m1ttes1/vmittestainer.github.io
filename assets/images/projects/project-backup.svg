  <rect x="698" y="242" width="24" height="148" rx="2" fill="#00D4AA" opacity="0.9"/>
  <rect x="732" y="241" width="24" height="149" rx="2" fill="#00D4AA"/>

  <text x="540" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W1</text>
  <text x="574" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W2</text>
  <text x="608" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W3</text>
  <text x="642" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W4</text>
  <text x="676" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W5</text>
  <text x="710" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W6</text>
  <text x="744" y="404" fill="#4A5568" font-size="9" text-anchor="middle">W7</text>

