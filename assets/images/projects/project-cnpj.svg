<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="480" fill="#0F1117"/>

  <!-- Top bar -->
  <rect width="800" height="48" fill="#161B27"/>
  <text x="20" y="30" fill="#00D4AA" font-size="13" font-weight="700">CNPJ MATCHING PIPELINE</text>
  <text x="20" y="43" fill="#4A5568" font-size="10">Python · pandas · openpyxl</text>
  <rect x="700" y="14" width="80" height="20" rx="3" fill="#00D4AA" opacity="0.1" stroke="#00D4AA" stroke-width="0.5"/>
  <text x="716" y="28" fill="#00D4AA" font-size="10">COMPLETED</text>

  <!-- Stats row -->
  <rect x="20" y="68" width="145" height="80" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="36" y="88" fill="#4A5568" font-size="10">RECORDS PROCESSED</text>
  <text x="36" y="120" fill="#F8F8F8" font-size="28" font-weight="700">~2,400</text>
  <text x="36" y="138" fill="#4A5568" font-size="10">per run</text>

  <rect x="180" y="68" width="145" height="80" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="196" y="88" fill="#4A5568" font-size="10">MATCH RATE</text>
  <text x="196" y="120" fill="#00D4AA" font-size="28" font-weight="700">99.2%</text>
  <text x="196" y="138" fill="#4A5568" font-size="10">exact + fuzzy</text>

  <rect x="340" y="68" width="145" height="80" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="356" y="88" fill="#4A5568" font-size="10">RUNTIME</text>
  <text x="356" y="115" fill="#F8F8F8" font-size="22" font-weight="700">3h → 8min</text>
  <text x="356" y="138" fill="#00D4AA" font-size="10">▼ 97% faster</text>

  <rect x="500" y="68" width="145" height="80" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="516" y="88" fill="#4A5568" font-size="10">SOURCE FILES</text>
  <text x="516" y="120" fill="#F8F8F8" font-size="28" font-weight="700">6</text>
  <text x="516" y="138" fill="#4A5568" font-size="10">Excel inputs merged</text>

  <rect x="660" y="68" width="120" height="80" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="676" y="88" fill="#4A5568" font-size="10">MANUAL ERRORS</text>
  <text x="676" y="120" fill="#F8F8F8" font-size="28" font-weight="700">0</text>
  <text x="676" y="138" fill="#00D4AA" font-size="10">vs ~40/run before</text>

  <!-- Pipeline diagram -->
  <rect x="20" y="168" width="760" height="60" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="36" y="188" fill="#8892A4" font-size="11" font-weight="600">PIPELINE FLOW</text>

  <!-- Steps -->
  <rect x="36" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="46" y="212" fill="#00D4AA" font-size="10">load_excel()</text>
  <text x="132" y="212" fill="#4A5568" font-size="12">→</text>
  <rect x="146" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="156" y="212" fill="#F59E0B" font-size="10">normalize()</text>
  <text x="242" y="212" fill="#4A5568" font-size="12">→</text>
  <rect x="256" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="266" y="212" fill="#F59E0B" font-size="10">deduplicate()</text>
  <text x="352" y="212" fill="#4A5568" font-size="12">→</text>
  <rect x="366" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="376" y="212" fill="#00D4AA" font-size="10">match_cnpj()</text>
  <text x="462" y="212" fill="#4A5568" font-size="12">→</text>
  <rect x="476" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="486" y="212" fill="#F8F8F8" font-size="10">flag_review()</text>
  <text x="572" y="212" fill="#4A5568" font-size="12">→</text>
  <rect x="586" y="198" width="90" height="20" rx="3" fill="#1E2535"/>
  <text x="596" y="212" fill="#00D4AA" font-size="10">export_xlsx()</text>

  <!-- Output preview -->
  <rect x="20" y="248" width="760" height="210" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="36" y="270" fill="#8892A4" font-size="11" font-weight="600">OUTPUT PREVIEW — matched_results.xlsx</text>

  <!-- Table header -->
  <rect x="20" y="278" width="760" height="22" fill="#1A2035"/>
  <text x="36" y="293" fill="#4A5568" font-size="10">CNPJ_INPUT</text>
  <text x="180" y="293" fill="#4A5568" font-size="10">CNPJ_MATCHED</text>
  <text x="340" y="293" fill="#4A5568" font-size="10">RAZAO_SOCIAL</text>
  <text x="560" y="293" fill="#4A5568" font-size="10">MATCH_TYPE</text>
  <text x="680" y="293" fill="#4A5568" font-size="10">SCORE</text>

  <!-- Rows -->
  <text x="36" y="316" fill="#C8D0DC" font-size="10">12.345.678/0001-**</text>
  <text x="180" y="316" fill="#C8D0DC" font-size="10">12.345.678/0001-**</text>
  <text x="340" y="316" fill="#C8D0DC" font-size="10">EMPRESA ALFA LTDA</text>
  <rect x="560" y="306" width="44" height="16" rx="3" fill="#00D4AA" opacity="0.15"/>
  <text x="568" y="318" fill="#00D4AA" font-size="10">EXACT</text>
  <text x="680" y="316" fill="#00D4AA" font-size="10">1.000</text>

  <line x1="36" y1="326" x2="764" y2="326" stroke="#1E2535" stroke-width="0.5"/>
  <text x="36" y="342" fill="#C8D0DC" font-size="10">98.765.432/0001-**</text>
  <text x="180" y="342" fill="#C8D0DC" font-size="10">98.765.432/0001-**</text>
  <text x="340" y="342" fill="#C8D0DC" font-size="10">DISTRIBUIDORA BETA S/A</text>
  <rect x="560" y="332" width="44" height="16" rx="3" fill="#00D4AA" opacity="0.15"/>
  <text x="568" y="344" fill="#00D4AA" font-size="10">EXACT</text>
  <text x="680" y="342" fill="#00D4AA" font-size="10">1.000</text>

  <line x1="36" y1="352" x2="764" y2="352" stroke="#1E2535" stroke-width="0.5"/>
  <text x="36" y="368" fill="#C8D0DC" font-size="10">11.222.333/0001-**</text>
  <text x="180" y="368" fill="#C8D0DC" font-size="10">11.222.333/0001-**</text>
  <text x="340" y="368" fill="#C8D0DC" font-size="10">COMERCIO GAMA EIRELI</text>
  <rect x="560" y="358" width="36" height="16" rx="3" fill="#F59E0B" opacity="0.15"/>
  <text x="568" y="370" fill="#F59E0B" font-size="10">FUZZY</text>
  <text x="680" y="368" fill="#F59E0B" font-size="10">0.923</text>

  <line x1="36" y1="378" x2="764" y2="378" stroke="#1E2535" stroke-width="0.5"/>
  <text x="36" y="394" fill="#C8D0DC" font-size="10">44.555.666/0001-**</text>
  <text x="180" y="394" fill="#C8D0DC" font-size="10">44.555.666/0001-**</text>
  <text x="340" y="394" fill="#C8D0DC" font-size="10">INDUSTRIA DELTA ME</text>
  <rect x="560" y="384" width="44" height="16" rx="3" fill="#00D4AA" opacity="0.15"/>
  <text x="568" y="396" fill="#00D4AA" font-size="10">EXACT</text>
  <text x="680" y="394" fill="#00D4AA" font-size="10">1.000</text>

  <line x1="36" y1="404" x2="764" y2="404" stroke="#1E2535" stroke-width="0.5"/>
  <text x="36" y="420" fill="#4A5568" font-size="10">... 2,396 more rows</text>
  <text x="680" y="420" fill="#4A5568" font-size="10">avg 0.997</text>

  <!-- Footer -->
  <rect x="0" y="462" width="800" height="18" fill="#0A0D14"/>
  <text x="20" y="474" fill="#2D3748" font-size="9">CNPJ data masked for privacy · Python 3.11 · pandas 2.x · vmittestainer.dev</text>
</svg>
