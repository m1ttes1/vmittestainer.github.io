  <text x="36" y="90" fill="#4A5568" font-size="10">ENDPOINTS</text>
  <text x="36" y="125" fill="#F8F8F8" font-size="32" font-weight="700">15</text>
  <text x="36" y="148" fill="#00D4AA" font-size="10">REST routes</text>

  <rect x="205" y="68" width="170" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="221" y="90" fill="#4A5568" font-size="10">REQ / SESSION</text>
  <text x="221" y="125" fill="#00D4AA" font-size="32" font-weight="700">200+</text>
  <text x="221" y="148" fill="#4A5568" font-size="10">avg writes per run</text>

  <rect x="390" y="68" width="170" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="406" y="90" fill="#4A5568" font-size="10">DATA LOSS INCIDENTS</text>
  <text x="406" y="125" fill="#F8F8F8" font-size="32" font-weight="700">0</text>
  <text x="406" y="148" fill="#00D4AA" font-size="10">snapshot isolation</text>

  <rect x="575" y="68" width="205" height="90" rx="6" fill="#161B27" stroke="#1E2535" stroke-width="1"/>
  <text x="591" y="90" fill="#4A5568" font-size="10">DASHBOARDS</text>
  <text x="591" y="125" fill="#F8F8F8" font-size="32" font-weight="700">4</text>
  <text x="591" y="148" fill="#00D4AA" font-size="10">mod · strategy · save · hub</text>

