  <text x="431" y="307" fill="#4A5568" font-size="9">14:01:44</text>
  <text x="490" y="307" fill="#F59E0B" font-size="9">POST</text>
  <text x="530" y="307" fill="#C8D0DC" font-size="10">/api/batch</text>
  <rect x="680" y="297" width="60" height="14" rx="2" fill="#00D4AA" opacity="0.1"/>
  <text x="686" y="308" fill="#00D4AA" font-size="9">12 rows</text>

  <text x="431" y="327" fill="#4A5568" font-size="9">14:01:31</text>
  <text x="490" y="327" fill="#00D4AA" font-size="9">GET</text>
  <text x="530" y="327" fill="#C8D0DC" font-size="10">/api/analytics/best</text>
  <rect x="680" y="317" width="60" height="14" rx="2" fill="#00D4AA" opacity="0.1"/>
  <text x="686" y="328" fill="#00D4AA" font-size="9">8 results</text>

  <text x="431" y="347" fill="#4A5568" font-size="9">14:01:18</text>
  <text x="490" y="347" fill="#00D4AA" font-size="9">GET</text>
  <text x="530" y="347" fill="#C8D0DC" font-size="10">/api/records</text>
  <rect x="680" y="337" width="60" height="14" rx="2" fill="#4A5568" opacity="0.2"/>
