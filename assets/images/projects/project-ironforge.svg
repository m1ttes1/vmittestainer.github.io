  <text x="20" y="43" fill="#4A5568" font-size="10">Python · Flask · SQLite · REST API</text>
  <circle cx="760" cy="24" r="6" fill="#00D4AA" opacity="0.3"/>
  <circle cx="760" cy="24" r="3" fill="#00D4AA"/>
