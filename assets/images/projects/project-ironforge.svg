  <rect x="36" y="316" width="34" height="14" rx="2" fill="#00D4AA" opacity="0.15"/>
  <text x="41" y="327" fill="#00D4AA" font-size="9">GET</text>
  <text x="80" y="327" fill="#C8D0DC" font-size="10">/api/analytics/best</text>
  <text x="310" y="327" fill="#4A5568" font-size="9">18ms  200</text>

  <rect x="36" y="336" width="34" height="14" rx="2" fill="#F59E0B" opacity="0.15"/>
  <text x="39" y="347" fill="#F59E0B" font-size="9">POST</text>
  <text x="80" y="347" fill="#C8D0DC" font-size="10">/api/batch</text>
  <text x="310" y="347" fill="#4A5568" font-size="9">62ms  200</text>

  <text x="36" y="382" fill="#4A5568" font-size="10">+ 8 more routes</text>

