  <line x1="36" y1="208" x2="380" y2="208" stroke="#1E2535" stroke-width="1"/>

  <!-- endpoint rows -->
  <rect x="36" y="216" width="34" height="14" rx="2" fill="#00D4AA" opacity="0.15"/>
  <text x="41" y="227" fill="#00D4AA" font-size="9">GET</text>
  <text x="80" y="227" fill="#C8D0DC" font-size="10">/api/status</text>
  <text x="310" y="227" fill="#4A5568" font-size="9">2ms  200</text>

  <rect x="36" y="236" width="34" height="14" rx="2" fill="#00D4AA" opacity="0.15"/>
