  <circle cx="432" cy="434" r="3" fill="#00D4AA"/>
  <text x="444" y="438" fill="#4A5568" font-size="9">SQLite connected · timeout 30s · busy_timeout 30000ms · PRAGMA WAL</text>

  <!-- Footer -->
  <rect x="0" y="462" width="800" height="18" fill="#0A0D14"/>
  <text x="20" y="474" fill="#2D3748" font-size="9">IronForge · Python 3 · Flask · SQLite3 · CORS enabled · vmittestainer.dev</text>
