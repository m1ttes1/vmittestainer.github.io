  <text x="431" y="287" fill="#4A5568" font-size="9">14:01:59</text>
  <text x="490" y="287" fill="#00D4AA" font-size="9">GET</text>
  <text x="530" y="287" fill="#C8D0DC" font-size="10">/api/status</text>
  <rect x="680" y="277" width="46" height="14" rx="2" fill="#00D4AA" opacity="0.1"/>
